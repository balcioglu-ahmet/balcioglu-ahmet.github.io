---
layout: default
author_profile: false
---

<div id="main" class="{% if page.author_profile or layout.author_profile or page.sidebar %}has-sidebar{% endif %}" role="main">
  {% include sidebar.html %}

  <div class="archive">
    <h1 class="page__title">{{ page.title }}</h1>
    {% include base_path %}
    {% for post in page.posts %}
      {% include archive-single.html %}
    {% endfor %}
  </div>
</div>
